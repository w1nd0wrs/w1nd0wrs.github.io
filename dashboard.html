<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body style="background:black; color:white; text-align:center; font-family:sans-serif;">
  <div class="topbar">
  <div class="left">
    <img src="https://raw.githubusercontent.com/WSCOfficial/wscofficial.github.io/main/images/favicon.png" class="logo">
    <span class="title">WSC</span>
  </div>

  <div class="right">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html">Login</a>
    <a href=https://wscofficial.github.io/TexScript>TexScript</a>
  </div>
</div>


  <h1>Dashboard</h1>
  <p id="welcome">Loading...</p>

  <button id="logoutBtn">Log Out</button>

  <script type="module">
    import { supabase } from "./auth.js";

    // 1. Check session
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      // Not logged in → redirect to login
      window.location.href = "login.html";
    }

    // 2. Show user info
    const user = session.user;
    document.getElementById("welcome").innerText =
      "Logged in as: " + user.email;

    // 3. Logout button
    document.getElementById("logoutBtn").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    };
  </script>

</body>
</html>
